services:
  - type: web
    name: daily-discipline-ai-prod
    env: docker
    rootDir: ai
    plan: starter
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    disk:
      name: daily-discipline-ai-prod-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: AI_PROVIDER
        value: auto
      - key: GEMINI_MODEL
        value: gemini-3-flash-preview
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: AI_ALLOWED_ORIGINS
        value: "*"
      - key: ANALYTICS_DB_PATH
        value: /var/data/discipline_analytics.sqlite3
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
  - type: web
    name: daily-discipline-security-gateway-prod
    env: docker
    rootDir: services/security-gateway
    plan: starter
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: AI_BACKEND_URL
        sync: false
      - key: SECURITY_AUTH_MODE
        value: firebase
      - key: FIREBASE_PROJECT_ID
        value: daily-planner-76712
      - key: APP_CHECK_MODE
        value: required
      - key: SECURITY_ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: AI_RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: UPSTREAM_TIMEOUT_SECONDS
        value: "8"
      - key: MAX_BODY_BYTES
        value: "1048576"
      - key: DATABASE_URL
        fromDatabase:
          name: daily-discipline-postgres-prod
          property: connectionString
      - key: ADMIN_DASHBOARD_TOKEN
        sync: false

  - type: web
    name: daily-discipline-stats-aggregator-prod
    env: docker
    rootDir: services/stats-aggregator
    plan: starter
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: STATS_DATA_FILE
        value: /var/data/task-events.jsonl
    disk:
      name: daily-discipline-stats-data
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: daily-discipline-postgres-prod
    databaseName: daily_discipline
    user: discipline
    plan: starter

name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  app-and-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Typecheck, lint, core tests, and E2E validation
        run: npm run qa

      - name: Tester readiness
        run: node scripts/check-tester-readiness.js

      - name: Hosted backend preflight
        run: npm run hosted:preflight

      - name: Repository security checks
        run: npm run security:check

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=critical

      - name: Firebase Functions syntax check
        run: npm run functions:check

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AI backend dependencies
        run: pip install -r ai/requirements.txt

      - name: Compile AI backend
        run: python -c "compile(open('ai/main.py', encoding='utf-8').read(), 'ai/main.py', 'exec')"

      - name: Run AI planner eval suite
        run: cd ai && python eval_planner.py

      - name: Upload AI eval report
        uses: actions/upload-artifact@v4
        with:
          name: ai-eval-report
          path: ai/evals/latest-report.json
          if-no-files-found: warn

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Test Go stats aggregator
        run: go test ./...
        working-directory: services/stats-aggregator

      - name: Test Go security gateway
        run: go test ./...
        working-directory: services/security-gateway

      - name: Validate Docker Compose stack
        run: npm run stack:config

      - name: Shell script syntax checks
        run: |
          bash -n scripts/check-hosted-backend.sh
          bash -n scripts/prepare-ios-widget-extension.sh
          bash -n scripts/prepare-ios-focus-extension.sh
          bash -n scripts/release-checklist.sh

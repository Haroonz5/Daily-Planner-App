services:
  - type: web
    name: daily-discipline-ai
    env: docker
    rootDir: ai
    plan: starter
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        value: auto
      - key: GEMINI_MODEL
        value: gemini-3-flash-preview
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: AI_ALLOWED_ORIGINS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
  - type: web
    name: daily-discipline-security-gateway
    env: docker
    rootDir: services/security-gateway
    plan: starter
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: AI_BACKEND_URL
        sync: false
      - key: SECURITY_AUTH_MODE
        value: firebase
      - key: FIREBASE_PROJECT_ID
        value: daily-planner-76712
      - key: APP_CHECK_MODE
        value: optional
      - key: SECURITY_ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: AI_RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: UPSTREAM_TIMEOUT_SECONDS
        value: "8"
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_DASHBOARD_TOKEN
        sync: false
